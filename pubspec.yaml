name: signspeak_v2
description: "SignBridge — Real-time ASL & ISL sign language recognition with multilingual translation"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camera — back camera only
  camera: ^0.11.1

  # TFLite inference — on-device ML
  tflite_flutter: ^0.11.0

  # HTTP for Gemini Pro API
  http: ^1.3.0

  # State management
  provider: ^6.1.2

  # Text to speech for translations
  flutter_tts: ^4.2.0

  # File system paths
  path_provider: ^2.1.5

  # Share/export collected data
  share_plus: ^10.1.4

  # Environment variables (.env file)
  flutter_dotenv: ^5.2.1

  # Loading animations
  lottie: ^3.3.1

  # Runtime permissions (camera)
  permission_handler: ^11.3.0

  # Image processing (YUV to RGB for camera frames)
  image: ^4.3.0

  # Premium typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/labels/
    - .env
